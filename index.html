<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>古堅南FC_試合記録アプリ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.23.12/babel.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-gray-900">
    <div id="root"></div>

    <script type="text/babel">
      window.onload = function() {
        const { useState, useEffect, useMemo } = React;
        
        if (!window.firebase) {
            console.error("Firebase library failed to load.");
            document.getElementById('root').innerText = "エラー: データベースライブラリの読み込みに失敗しました。ページを再読み込みしてください。";
            return;
        }

        // --- Firebaseの初期化 ---
        const firebaseConfig = {
            apiKey: "AIzaSyCmU2dJyLFFpODmuD7mkQJwDszvIo7xU68",
            authDomain: "soccer-stats-fmfc.firebaseapp.com",
            projectId: "soccer-stats-fmfc",
            storageBucket: "soccer-stats-fmfc.appspot.com",
            messagingSenderId: "812354510220",
            appId: "1:812354510220:web:966a4d86b2d49652facaa9"
        };
        const appId = firebaseConfig.projectId;
          
        let app, db, auth;
        try {
            app = firebase.initializeApp(firebaseConfig);
            db = firebase.firestore();
            auth = firebase.auth();
        } catch (e) {
            console.error("Firebase initialization error:", e);
            document.getElementById('root').innerText = "エラー: データベースの初期化に失敗しました。";
            return;
        }

        // --- アイコンコンポーネント ---
        const IconPlus = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>;
        const IconTrash = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>;
        const IconEdit = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path></svg>;
        const IconChevronDown = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>;
        const IconX = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>;
        const IconLock = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>;
        const IconUnlock = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 9.9-1"></path></svg>;

        // --- メインアプリケーションコンポーネント ---
        function App() {
            const [page, setPage] = useState('dashboard');
            const [players, setPlayers] = useState([]);
            const [matches, setMatches] = useState([]);
            const [isAuthReady, setIsAuthReady] = useState(false);
            const [editingMatch, setEditingMatch] = useState(null);
            const [isEditMode, setIsEditMode] = useState(false);
            const [showPasswordModal, setShowPasswordModal] = useState(false);

            useEffect(() => {
                if (!auth) return;
                const unsubscribe = auth.onAuthStateChanged(async (currentUser) => {
                    if (!currentUser) {
                        try {
                           await auth.signInAnonymously();
                        } catch (error) { 
                            console.error("Authentication failed: ", error); 
                            document.getElementById('root').innerText = "認証エラーが発生しました。Firebaseコンソールの設定を確認してください。";
                        }
                    }
                    setIsAuthReady(true);
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!isAuthReady || !db) return;
                const playersCollectionPath = `artifacts/${appId}/public/data/players`;
                const matchesCollectionPath = `artifacts/${appId}/public/data/matches`;

                const unsubPlayers = db.collection(playersCollectionPath).onSnapshot((snap) => setPlayers(snap.docs.map(d => ({id: d.id, ...d.data()}))), (e) => console.error("Player fetch error", e));
                const unsubMatches = db.collection(matchesCollectionPath).onSnapshot((snap) => setMatches(snap.docs.map(d => ({id: d.id, ...d.data()}))), (e) => console.error("Match fetch error", e));

                return () => { unsubPlayers(); unsubMatches(); };
            }, [isAuthReady]);

            const navigate = (pageName, data = null) => {
                if (pageName.includes('add') || pageName.includes('edit') || pageName.includes('management')) {
                    if (!isEditMode) { setShowPasswordModal(true); return; }
                }
                if (pageName === 'edit-match') setEditingMatch(data);
                else setEditingMatch(null);
                setPage(pageName);
            };
            
            const handlePasswordSubmit = (password) => {
                if (password === 'soccer') { 
                    setIsEditMode(true); 
                    setShowPasswordModal(false); 
                } else { 
                    alert('合言葉が違います。');
                }
            };

            const logout = () => { setIsEditMode(false); setPage('dashboard'); };

            const playerStats = useMemo(() => {
                return players.map(player => {
                    const base = player.baseStats || { matchesPlayed: 0, goals: 0, assists: 0, cautions: 0, ejections: 0 };
                    const calc = { matchesPlayed: 0, goals: 0, assists: 0, cautions: 0, ejections: 0 };
                    matches.forEach(m => {
                        const isStarter = (m.starters || []).some(s => s.playerId === player.id);
                        const isSub = (m.subs || []).some(s => s.playerIn === player.id);
                        if (isStarter || isSub) {
                            calc.matchesPlayed++;
                        }
                        (m.goals || []).forEach(g => {
                            if (g.scorerId === player.id) calc.goals++;
                            if (g.assistId === player.id) calc.assists++;
                        });
                        (m.cautions || []).forEach(c => { if (c.playerId === player.id) calc.cautions++; });
                        (m.ejections || []).forEach(e => { if (e.playerId === player.id) calc.ejections++; });
                    });
                    return {
                        ...player,
                        totalMatchesPlayed: (base.matchesPlayed || 0) + calc.matchesPlayed,
                        totalGoals: (base.goals || 0) + calc.goals,
                        totalAssists: (base.assists || 0) + calc.assists,
                        totalCautions: (base.cautions || 0) + calc.cautions,
                        totalEjections: (base.ejections || 0) + calc.ejections,
                    };
                });
            }, [players, matches]);
            
            const renderPage = () => {
                switch (page) {
                    case 'dashboard': return <Dashboard navigate={navigate} matches={matches} isEditMode={isEditMode} />;
                    case 'rankings': return <RankingsPage playerStats={playerStats} matches={matches} players={players} />;
                    case 'match-list': return <MatchList navigate={navigate} matches={matches} players={players} isEditMode={isEditMode} />;
                    case 'player-management': return <PlayerManagement players={players} />;
                    case 'add-match': return <MatchForm navigate={navigate} players={players} />;
                    case 'edit-match': return <MatchForm navigate={navigate} players={players} existingMatch={editingMatch} />;
                    case 'player-stats': return <PlayerStatsList playerStats={playerStats} />;
                    default: return <Dashboard navigate={navigate} matches={matches} isEditMode={isEditMode}/>;
                }
            };

            if (!isAuthReady) return <div className="flex justify-center items-center h-screen bg-gray-800"><div className="text-xl font-semibold text-white">読み込み中...</div></div>;

            return (
                <div className="bg-gray-900 min-h-screen font-sans text-white">
                    <Header navigate={navigate} isEditMode={isEditMode} onEditModeToggle={() => setShowPasswordModal(true)} onLogout={logout} />
                    <main className="p-4 sm:p-8">{renderPage()}</main>
                    {showPasswordModal && <PasswordModal onSubmit={handlePasswordSubmit} onClose={() => setShowPasswordModal(false)} />}
                </div>
            );
        }

        function Header({ navigate, isEditMode, onEditModeToggle, onLogout }) {
            const emblemUrl = "https://i.imgur.com/h4W4M2S.jpeg";
            const [isMenuOpen, setIsMenuOpen] = useState(false);

            const handleNavigate = (page) => {
                navigate(page);
                setIsMenuOpen(false);
            };
            
            return (
                <header className="bg-gray-800 shadow-lg sticky top-0 z-40">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div className="flex justify-between items-center h-20">
                            <div className="flex items-center cursor-pointer" onClick={() => handleNavigate('dashboard')}>
                                {emblemUrl ? <img src={emblemUrl} alt="チームエンブレム" className="h-14 w-auto mr-2 md:mr-4"/> : <div className="h-14 w-14 mr-2 md:mr-4"></div>}
                                <h1 className="text-lg sm:text-xl md:text-2xl font-bold text-white tracking-wider">FURUGEN MINAMI FC</h1>
                            </div>
                            {/* Desktop Menu */}
                            <nav className="hidden sm:flex items-center space-x-2">
                                <button onClick={() => handleNavigate('dashboard')} className="text-gray-300 hover:bg-gray-700 hover:text-white px-3 py-2 rounded-md font-medium transition-colors">ダッシュボード</button>
                                <button onClick={() => handleNavigate('rankings')} className="text-gray-300 hover:bg-gray-700 hover:text-white px-3 py-2 rounded-md font-medium transition-colors">ランキング</button>
                                <button onClick={() => handleNavigate('match-list')} className="text-gray-300 hover:bg-gray-700 hover:text-white px-3 py-2 rounded-md font-medium transition-colors">試合一覧</button>
                                {isEditMode && <button onClick={() => handleNavigate('player-management')} className="text-gray-300 hover:bg-gray-700 hover:text-white px-3 py-2 rounded-md font-medium transition-colors">選手管理</button>}
                                {isEditMode ? (
                                    <button onClick={onLogout} className="flex items-center bg-red-500 text-white font-bold py-2 px-4 rounded-lg hover:bg-red-600 transition-colors shadow-md"><IconUnlock className="mr-2"/>閲覧モード</button>
                                ) : (
                                    <button onClick={onEditModeToggle} className="flex items-center bg-sky-500 text-white font-bold py-2 px-4 rounded-lg hover:bg-sky-600 transition-colors shadow-md"><IconLock className="mr-2"/>編集モード</button>
                                )}
                            </nav>
                                {/* Mobile Menu Button */}
                            <div className="sm:hidden">
                                <button onClick={() => setIsMenuOpen(!isMenuOpen)} className="text-gray-300 hover:text-white focus:outline-none p-2">
                                    <svg className="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 6h16M4 12h16M4 18h16" />
                                    </svg>
                                </button>
                            </div>
                        </div>
                    </div>
                        {/* Mobile Menu */}
                    {isMenuOpen && (
                        <div className="sm:hidden">
                            <nav className="px-2 pt-2 pb-3 space-y-1 sm:px-3">
                                <button onClick={() => handleNavigate('dashboard')} className="text-gray-300 hover:bg-gray-700 hover:text-white block w-full text-left px-3 py-2 rounded-md font-medium transition-colors">ダッシュボード</button>
                                <button onClick={() => handleNavigate('rankings')} className="text-gray-300 hover:bg-gray-700 hover:text-white block w-full text-left px-3 py-2 rounded-md font-medium transition-colors">ランキング</button>
                                <button onClick={() => handleNavigate('match-list')} className="text-gray-300 hover:bg-gray-700 hover:text-white block w-full text-left px-3 py-2 rounded-md font-medium transition-colors">試合一覧</button>
                                {isEditMode && <button onClick={() => handleNavigate('player-management')} className="text-gray-300 hover:bg-gray-700 hover:text-white block w-full text-left px-3 py-2 rounded-md font-medium transition-colors">選手管理</button>}
                                <div className="pt-2">
                                    {isEditMode ? (
                                        <button onClick={() => { onLogout(); setIsMenuOpen(false); }} className="flex items-center w-full text-left bg-red-500 text-white font-bold py-2 px-3 rounded-lg hover:bg-red-600 transition-colors shadow-md"><IconUnlock className="mr-2"/>閲覧モード</button>
                                    ) : (
                                        <button onClick={() => { onEditModeToggle(); setIsMenuOpen(false); }} className="flex items-center w-full text-left bg-sky-500 text-white font-bold py-2 px-3 rounded-lg hover:bg-sky-600 transition-colors shadow-md"><IconLock className="mr-2"/>編集モード</button>
                                    )}
                                </div>
                            </nav>
                        </div>
                    )}
                </header>
            );
        }

        function PasswordModal({ onSubmit, onClose }) {
            const [password, setPassword] = useState('');
            const handleSubmit = (e) => { e.preventDefault(); onSubmit(password); };
            return (
                <div className="fixed inset-0 bg-black bg-opacity-75 flex justify-center items-center z-50">
                    <div className="bg-gray-800 border border-gray-700 rounded-lg shadow-xl p-8 w-full max-w-sm m-4">
                        <div className="flex justify-between items-center mb-4"><h3 className="text-xl font-bold text-white">編集モード</h3><button onClick={onClose} className="text-gray-400 hover:text-white"><IconX /></button></div>
                        <p className="text-gray-400 mb-4">編集するには合言葉を入力してください。</p>
                        <form onSubmit={handleSubmit}>
                            <input type="password" value={password} onChange={(e) => setPassword(e.target.value)} className="w-full bg-gray-700 border border-gray-600 text-white rounded-md shadow-sm py-2 px-3 mb-4 focus:ring-sky-500 focus:border-sky-500" placeholder="合言葉" autoFocus />
                            <button type="submit" className="w-full bg-sky-500 text-white font-bold py-2 px-4 rounded-lg hover:bg-sky-600 transition-colors">決定</button>
                        </form>
                    </div>
                </div>
            );
        }

        function Dashboard({ navigate, matches, isEditMode }) {
            const sortedMatches = useMemo(() => [...matches].sort((a, b) => new Date(b.date) - new Date(a.date)), [matches]);
            
            const CategoryDashboard = ({ category }) => {
                const categoryMatches = useMemo(() => sortedMatches.filter(m => m.matchCategory === category), [sortedMatches, category]);
                const last10CategoryMatches = useMemo(() => categoryMatches.slice(0, 10), [categoryMatches]);
                
                const teamStats = useMemo(() => {
                    let wins = 0, losses = 0, draws = 0, goalsFor = 0, goalsAgainst = 0;
                    last10CategoryMatches.forEach(match => {
                        if (match.result === '勝利') wins++;
                        else if (match.result === '敗戦') losses++;
                        else if (match.result === '引分') draws++;
                        goalsFor += match.ownScore || 0;
                        goalsAgainst += match.opponentScore || 0;
                    });
                    return { wins, losses, draws, goalsFor, goalsAgainst, goalDifference: goalsFor - goalsAgainst, last5Matches: last10CategoryMatches.slice(0, 5) };
                }, [last10CategoryMatches]);
                
                return (
                    <div className="bg-gray-800 p-6 rounded-lg shadow-lg border border-gray-700 space-y-6 flex flex-col">
                        <h3 className="text-3xl font-bold text-white text-center">{category}</h3>
                        <div className="bg-gray-900 p-4 rounded-lg min-h-[160px]">
                            <h4 className="text-lg font-semibold text-white mb-2 text-center">戦績 (直近10試合)</h4>
                            {last10CategoryMatches.length > 0 ? (
                                <>
                                    <div className="flex justify-around text-center">
                                        <div><p className="text-2xl font-bold text-green-400">{teamStats.wins}</p><p className="text-xs text-gray-400">勝利</p></div>
                                        <div><p className="text-2xl font-bold text-red-400">{teamStats.losses}</p><p className="text-xs text-gray-400">敗戦</p></div>
                                        <div><p className="text-2xl font-bold text-yellow-400">{teamStats.draws}</p><p className="text-xs text-gray-400">引分</p></div>
                                    </div>
                                    <div className="flex justify-around text-center pt-3 mt-3 border-t border-gray-700">
                                        <div><p className="text-2xl font-bold text-sky-400">{teamStats.goalsFor}</p><p className="text-xs text-gray-400">得点</p></div>
                                        <div><p className="text-2xl font-bold text-orange-400">{teamStats.goalsAgainst}</p><p className="text-xs text-gray-400">失点</p></div>
                                        <div><p className={`text-2xl font-bold ${teamStats.goalDifference >= 0 ? 'text-green-400' : 'text-red-400'}`}>{teamStats.goalDifference > 0 ? '+' : ''}{teamStats.goalDifference}</p><p className="text-xs text-gray-400">得失点差</p></div>
                                    </div>
                                </>
                            ) : (<p className="text-gray-500 text-center text-sm pt-4">記録がありません</p>)}
                        </div>
                        <div className="bg-gray-900 p-4 rounded-lg min-h-[190px]">
                            <h4 className="text-lg font-semibold mb-2 text-white text-center">最近の試合結果</h4>
                            {teamStats.last5Matches.length > 0 ? (
                                <ul className="space-y-2">
                                    {teamStats.last5Matches.map(match => (
                                        <li key={match.id} className="flex justify-between items-center text-sm">
                                            <span>vs {match.opponent}</span>
                                            <span className="font-bold">{match.ownScore} - {match.opponentScore}
                                                <span className={`ml-2 px-2 py-0.5 text-xs font-semibold rounded-full ${match.result === '勝利' ? 'bg-green-500 text-white' : match.result === '敗戦' ? 'bg-red-500 text-white' : 'bg-yellow-500 text-white'}`}>
                                                    {match.result}
                                                </span>
                                            </span>
                                        </li>
                                    ))}
                                </ul>
                            ) : (<p className="text-gray-500 text-center text-sm pt-4">記録がありません</p>)}
                        </div>
                    </div>
                );
            };

            return (
                <div className="space-y-8">
                    <div className="bg-gray-800 p-6 rounded-lg shadow-lg text-center border border-gray-700">
                        <h2 className="text-3xl font-bold text-white mb-4">TEAM DASHBOARD</h2>
                        <p className="text-gray-400 mb-6">試合結果や選手の成績を記録・管理しましょう。</p>
                        <div className="flex flex-col sm:flex-row justify-center gap-4">
                            {isEditMode && <button onClick={() => navigate('add-match')} className="bg-red-500 text-white font-bold py-3 px-6 rounded-lg hover:bg-red-600 transition-colors shadow-md flex items-center justify-center"><IconPlus /> <span className="ml-2">新しい試合を記録</span></button>}
                            <button onClick={() => navigate('player-stats')} className="bg-gray-700 text-white font-bold py-3 px-6 rounded-lg hover:bg-gray-600 transition-colors shadow-md">選手成績一覧を見る</button>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                        <CategoryDashboard category="U12" />
                        <CategoryDashboard category="U11" />
                        <CategoryDashboard category="U10" />
                    </div>
                </div>
            );
        }

        function RankingsPage({ playerStats, matches, players }) {
            const sortedMatches = useMemo(() => [...matches].sort((a, b) => new Date(b.date) - new Date(a.date)), [matches]);
            
            const totalGoalRanking = [...playerStats].filter(p => p.totalGoals > 0).sort((a, b) => b.totalGoals - a.totalGoals).slice(0, 5);
            const totalAssistRanking = [...playerStats].filter(p => p.totalAssists > 0).sort((a, b) => b.totalAssists - a.totalAssists).slice(0, 5);

            const CategoryRankings = ({ category }) => {
                const categoryPlayers = useMemo(() => {
                    const categoryAge = parseInt(category.replace('U', ''));
                    if (category === 'U10') {
                        return players.filter(p => {
                            if (!p.category) return false;
                            const playerAge = parseInt(p.category.replace('U', ''));
                            return playerAge <= categoryAge;
                        });
                    } else {
                        return players.filter(p => p.category === category);
                    }
                }, [players, category]);
                
                const categoryPlayerStats = useMemo(() => {
                    const stats = {};
                    categoryPlayers.forEach(p => { 
                        const totalPlayerStat = playerStats.find(ps => ps.id === p.id);
                        stats[p.id] = { 
                            ...p,
                            recentGoals: 0, 
                            recentAssists: 0,
                            totalGoals: totalPlayerStat ? totalPlayerStat.totalGoals : 0,
                            totalAssists: totalPlayerStat ? totalPlayerStat.totalAssists : 0,
                        }; 
                    });

                    const last10OverallMatches = sortedMatches.slice(0, 10);

                    last10OverallMatches.forEach(m => {
                        (m.goals || []).forEach(g => {
                            if (stats[g.scorerId]) {
                                stats[g.scorerId].recentGoals++;
                            }
                            if (stats[g.assistId]) {
                                stats[g.assistId].recentAssists++;
                            }
                        });
                    });
                    return Object.values(stats);
                }, [categoryPlayers, sortedMatches, playerStats]);

                const recentGoalRanking = [...categoryPlayerStats].filter(p => p.recentGoals > 0).sort((a, b) => b.recentGoals - a.recentGoals).slice(0, 5);
                const recentAssistRanking = [...categoryPlayerStats].filter(p => p.recentAssists > 0).sort((a, b) => b.recentAssists - a.recentAssists).slice(0, 5);
                const categoryTotalGoalRanking = [...categoryPlayerStats].filter(p => p.totalGoals > 0).sort((a, b) => b.totalGoals - a.totalGoals).slice(0, 5);
                const categoryTotalAssistRanking = [...categoryPlayerStats].filter(p => p.totalAssists > 0).sort((a, b) => b.totalAssists - a.totalAssists).slice(0, 5);

                return (
                    <div className="bg-gray-800 p-6 rounded-lg shadow-lg border border-gray-700 space-y-6 flex flex-col">
                        <h3 className="text-3xl font-bold text-white text-center">{category}</h3>
                        <RankingCard title="得点 (直近10試合)" ranking={recentGoalRanking} dataKey="recentGoals" unit="点" color="text-red-400" />
                        <RankingCard title="アシスト (直近10試合)" ranking={recentAssistRanking} dataKey="recentAssists" unit="回" color="text-sky-400" />
                        <RankingCard title="通算 得点" ranking={categoryTotalGoalRanking} dataKey="totalGoals" unit="点" color="text-red-400" />
                        <RankingCard title="通算 アシスト" ranking={categoryTotalAssistRanking} dataKey="totalAssists" unit="回" color="text-sky-400" />
                    </div>
                );
            };

            return (
                <div className="space-y-8">
                    <h2 className="text-3xl font-bold text-white mb-4 text-center">ランキング</h2>
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                        <CategoryRankings category="U12" />
                        <CategoryRankings category="U11" />
                        <CategoryRankings category="U10" />
                    </div>
                    <div className="grid md:grid-cols-2 gap-8 pt-8 border-t-2 border-gray-700">
                        <RankingCard title="全体の通算 得点ランキング" ranking={totalGoalRanking} dataKey="totalGoals" unit="点" color="text-red-400" />
                        <RankingCard title="全体の通算 アシストランキング" ranking={totalAssistRanking} dataKey="totalAssists" unit="回" color="text-sky-400" />
                    </div>
                </div>
            )
        }

        function RankingCard({ title, ranking, dataKey, unit, color }) {
            const rankColors = ['text-yellow-400', 'text-gray-300', 'text-yellow-600'];
            let lastScore = -1;
            let currentRank = 0;
            return (
                <div className="bg-gray-900 p-4 rounded-lg min-h-[250px]">
                    <h3 className="text-lg font-semibold mb-3 text-white text-center">{title}</h3>
                    {ranking.length > 0 ? (
                        <ol className="space-y-2">
                            {ranking.map((player, index) => {
                                if (player[dataKey] !== lastScore) {
                                    currentRank = index + 1;
                                    lastScore = player[dataKey];
                                }
                                return (
                                    <li key={player.id || player.name} className="flex items-center justify-between p-2 bg-gray-800 rounded-md text-sm">
                                        <div className="flex items-center">
                                            <span className={`font-bold w-7 ${rankColors[currentRank - 1] || 'text-gray-500'}`}>
                                                {currentRank}.
                                            </span>
                                            <span className="font-medium">{player.name}</span>
                                        </div>
                                        <span className={`font-bold ${color}`}>{player[dataKey]} {unit}</span>
                                    </li>
                                );
                            })}
                        </ol>
                    ) : (<p className="text-gray-500 text-center text-sm pt-4">記録がありません</p>)}
                </div>
            );
        }

        function PlayerManagement({ players }) {
            const [name, setName] = useState('');
            const [number, setNumber] = useState('');
            const [category, setCategory] = useState('U12');
            const [editingPlayer, setEditingPlayer] = useState(null);
            const categories = ['U12', 'U11', 'U10', 'U9', 'U8', 'U7'];

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!name || !number || !category) { return; }
                const playersCollectionPath = `artifacts/${appId}/public/data/players`;
                const playerData = { name, number: parseInt(number, 10), category };
                if (editingPlayer) {
                    await db.collection(playersCollectionPath).doc(editingPlayer.id).update(playerData);
                    setEditingPlayer(null);
                } else {
                    playerData.baseStats = { matchesPlayed: 0, goals: 0, assists: 0, cautions: 0, ejections: 0 };
                    await db.collection(playersCollectionPath).add(playerData);
                }
                setName(''); setNumber(''); setCategory('U12');
            };

            const handleEdit = (player) => { 
                setEditingPlayer(player); 
                setName(player.name); 
                setNumber(player.number); 
                setCategory(player.category || 'U12');
            };

            const handleDelete = async (id) => {
                if (window.confirm("本当にこの選手を削除しますか？")) {
                    const playersCollectionPath = `artifacts/${appId}/public/data/players`;
                    await db.collection(playersCollectionPath).doc(id).delete();
                }
            };

            return (
                <div className="space-y-6">
                    <h2 className="text-3xl font-bold text-center">選手管理</h2>
                    <form onSubmit={handleSubmit} className="bg-gray-800 p-6 rounded-lg border border-gray-700 max-w-md mx-auto space-y-4">
                        <h3 className="text-xl font-bold">{editingPlayer ? '選手情報の編集' : '新規選手登録'}</h3>
                        <div>
                            <label className="block text-sm font-medium text-gray-300">背番号</label>
                            <input type="number" value={number} onChange={(e) => setNumber(e.target.value)} className="mt-1 block w-full bg-gray-700 border border-gray-600 rounded-md py-2 px-3 text-white" required />
                        </div>
                        <div>
                            <label className="block text-sm font-medium text-gray-300">名前</label>
                            <input type="text" value={name} onChange={(e) => setName(e.target.value)} className="mt-1 block w-full bg-gray-700 border border-gray-600 rounded-md py-2 px-3 text-white" required />
                        </div>
                        <div>
                            <label className="block text-sm font-medium text-gray-300">カテゴリー</label>
                            <select value={category} onChange={(e) => setCategory(e.target.value)} className="mt-1 block w-full bg-gray-700 border border-gray-600 rounded-md py-2 px-3 text-white">
                                {categories.map(c => <option key={c} value={c}>{c}</option>)}
                            </select>
                        </div>
                        <div className="flex gap-2">
                            <button type="submit" className="flex-1 bg-sky-500 hover:bg-sky-600 text-white font-bold py-2 px-4 rounded-md">{editingPlayer ? '更新' : '登録'}</button>
                            {editingPlayer && (
                                <button type="button" onClick={() => { setEditingPlayer(null); setName(''); setNumber(''); }} className="bg-gray-600 hover:bg-gray-500 text-white font-bold py-2 px-4 rounded-md">キャンセル</button>
                            )}
                        </div>
                    </form>

                    <div className="bg-gray-800 p-6 rounded-lg border border-gray-700 max-w-4xl mx-auto overflow-x-auto">
                        <table className="w-full text-left border-collapse">
                            <thead>
                                <tr className="border-b border-gray-700 text-gray-400">
                                    <th className="py-2 px-4">背番号</th>
                                    <th className="py-2 px-4">名前</th>
                                    <th className="py-2 px-4">カテゴリー</th>
                                    <th className="py-2 px-4 text-right">操作</th>
                                </tr>
                            </thead>
                            <tbody>
                                {[...players].sort((a,b) => a.number - b.number).map(player => (
                                    <tr key={player.id} className="border-b border-gray-700 hover:bg-gray-750">
                                        <td className="py-2 px-4 font-mono">#{player.number}</td>
                                        <td className="py-2 px-4 font-bold">{player.name}</td>
                                        <td className="py-2 px-4">{player.category}</td>
                                        <td className="py-2 px-4 text-right space-x-2">
                                            <button onClick={() => handleEdit(player)} className="text-sky-400 hover:text-sky-300"><IconEdit /></button>
                                            <button onClick={() => handleDelete(player.id)} className="text-red-400 hover:text-red-300"><IconTrash /></button>
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        }

        function MatchList({ navigate, matches, players, isEditMode }) {
            const [selectedMatchId, setSelectedMatchId] = useState(null);
            const sortedMatches = useMemo(() => [...matches].sort((a, b) => new Date(b.date) - new Date(a.date)), [matches]);

            const handleDelete = async (id) => {
                if (window.confirm('本当にこの試合記録を削除しますか？')) {
                    const matchesCollectionPath = `artifacts/${appId}/public/data/matches`;
                    await db.collection(matchesCollectionPath).doc(id).delete();
                }
            };

            const getPlayerName = (id) => {
                const p = players.find(pl => pl.id === id);
                return p ? p.name : '不明な選手';
            };

            return (
                <div className="space-y-6 max-w-4xl mx-auto">
                    <h2 className="text-3xl font-bold text-center">試合一覧</h2>
                    {sortedMatches.length === 0 ? (
                        <p className="text-center text-gray-500">試合記録がありません。</p>
                    ) : (
                        <div className="space-y-4">
                            {sortedMatches.map(match => {
                                const isExpanded = selectedMatchId === match.id;
                                return (
                                    <div key={match.id} className="bg-gray-800 border border-gray-700 rounded-lg shadow-md overflow-hidden">
                                        <div 
                                            className="p-4 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 cursor-pointer hover:bg-gray-750"
                                            onClick={() => setSelectedMatchId(isExpanded ? null : match.id)}
                                        >
                                            <div>
                                                <span className="text-xs bg-gray-700 text-gray-300 px-2 py-1 rounded-md mr-2">{match.matchCategory}</span>
                                                <span className="text-sm text-gray-400">{match.date}</span>
                                                <h3 className="text-xl font-bold mt-1">vs {match.opponent}</h3>
                                            </div>
                                            <div className="flex items-center gap-4 w-full sm:w-auto justify-between sm:justify-end">
                                                <div className="text-right">
                                                    <span className="text-2xl font-black mr-2">{match.ownScore} - {match.opponentScore}</span>
                                                    <span className={`px-3 py-1 text-xs font-bold rounded-full ${match.result === '勝利' ? 'bg-green-500' : match.result === '敗戦' ? 'bg-red-500' : 'bg-yellow-500'}`}>{match.result}</span>
                                                </div>
                                                <div className="flex items-center gap-2" onClick={(e) => e.stopPropagation()}>
                                                    {isEditMode && (
                                                        <>
                                                            <button onClick={() => navigate('edit-match', match)} className="p-2 text-sky-400 hover:bg-gray-700 rounded-md"><IconEdit /></button>
                                                            <button onClick={() => handleDelete(match.id)} className="p-2 text-red-400 hover:bg-gray-700 rounded-md"><IconTrash /></button>
                                                        </>
                                                    )}
                                                    <span className={`text-gray-400 transform transition-transform ${isExpanded ? 'rotate-180' : ''}`}><IconChevronDown /></span>
                                                </div>
                                            </div>
                                        </div>
                                        
                                        {isExpanded && (
                                            <div className="p-4 bg-gray-900 border-t border-gray-700 space-y-4 text-sm">
                                                <div>
                                                    <h4 className="font-bold text-gray-400 mb-1">スターティングメンバー</h4>
                                                    <p className="text-gray-200">{(match.starters || []).map(s => getPlayerName(s.playerId)).join(', ') || '未登録'}</p>
                                                </div>
                                                {match.subs && match.subs.length > 0 && (
                                                    <div>
                                                        <h4 className="font-bold text-gray-400 mb-1">交代選手</h4>
                                                        <ul className="list-disc list-inside text-gray-200">
                                                            {match.subs.map((s, idx) => (
                                                                <li key={idx}>OUT: {getPlayerName(s.playerOut)} ➔ IN: {getPlayerName(s.playerIn)}</li>
                                                            ))}
                                                        </ul>
                                                    </div>
                                                )}
                                                <div>
                                                    <h4 className="font-bold text-gray-400 mb-1">得点経過</h4>
                                                    {(match.goals || []).length === 0 ? <p className="text-gray-500">得点記録なし</p> : (
                                                        <ul className="list-decimal list-inside text-gray-200 space-y-1">
                                                            {match.goals.map((g, idx) => (
                                                                <li key={idx}>
                                                                    得点: <span className="font-bold text-green-400">{getPlayerName(g.scorerId)}</span> 
                                                                    {g.assistId ? <span> (アシスト: <span className="text-sky-400">{getPlayerName(g.assistId)}</span>)</span> : ' (アシストなし)'}
                                                                </li>
                                                            ))}
                                                        </ul>
                                                    )}
                                                </div>
                                                {((match.cautions && match.cautions.length > 0) || (match.ejections && match.ejections.length > 0)) && (
                                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 pt-2 border-t border-gray-800">
                                                        {match.cautions && match.cautions.length > 0 && (
                                                            <div>
                                                                <h4 className="font-bold text-yellow-500 mb-1">警告 (イエロー)</h4>
                                                                <p className="text-gray-200">{match.cautions.map(c => getPlayerName(c.playerId)).join(', ')}</p>
                                                            </div>
                                                        )}
                                                        {match.ejections && match.ejections.length > 0 && (
                                                            <div>
                                                                <h4 className="font-bold text-red-500 mb-1">退場 (レッド)</h4>
                                                                <p className="text-gray-200">{match.ejections.map(e => getPlayerName(e.playerId)).join(', ')}</p>
                                                            </div>
                                                        )}
                                                    </div>
                                                )}
                                            </div>
                                        )}
                                    </div>
                                );
                            })}
                        </div>
                    )}
                </div>
            );
        }

        function MatchForm({ navigate, players, existingMatch = null }) {
            const [date, setDate] = useState(existingMatch ? existingMatch.date : new Date().toISOString().split('T')[0]);
            const [matchCategory, setMatchCategory] = useState(existingMatch ? existingMatch.matchCategory : 'U12');
            const [opponent, setOpponent] = useState(existingMatch ? existingMatch.opponent : '');
            const [ownScore, setOwnScore] = useState(existingMatch ? existingMatch.ownScore : 0);
            const [opponentScore, setOpponentScore] = useState(existingMatch ? existingMatch.opponentScore : 0);
            const [result, setResult] = useState(existingMatch ? existingMatch.result : '勝利');

            const [starters, setStarters] = useState(existingMatch ? existingMatch.starters || [] : []);
            const [subs, setSubs] = useState(existingMatch ? existingMatch.subs || [] : []);
            const [goals, setGoals] = useState(existingMatch ? existingMatch.goals || [] : []);
            const [cautions, setCautions] = useState(existingMatch ? existingMatch.cautions || [] : []);
            const [ejections, setEjections] = useState(existingMatch ? existingMatch.ejections || [] : []);

            const [currentScorer, setCurrentScorer] = useState('');
            const [currentAssist, setCurrentAssist] = useState('');
            const [subOut, setSubOut] = useState('');
            const [subIn, setSubIn] = useState('');
            const [cautionPlayer, setCautionPlayer] = useState('');
            const [ejectionPlayer, setEjectionPlayer] = useState('');

            const categories = ['U12', 'U11', 'U10', 'U9', 'U8', 'U7'];

            useEffect(() => {
                if (ownScore > opponentScore) setResult('勝利');
                else if (ownScore < opponentScore) setResult('敗戦');
                else setResult('引分');
            }, [ownScore, opponentScore]);

            const toggleStarter = (playerId) => {
                if (starters.some(s => s.playerId === playerId)) {
                    setStarters(starters.filter(s => s.playerId !== playerId));
                } else {
                    setStarters([...starters, { playerId }]);
                }
            };

            const addGoal = () => {
                if (!currentScorer) return;
                setGoals([...goals, { scorerId: currentScorer, assistId: currentAssist || null }]);
                setCurrentScorer('');
                setCurrentAssist('');
                setOwnScore(prev => prev + 1);
            };

            const removeGoal = (index) => {
                setGoals(goals.filter((_, i) => i !== index));
                setOwnScore(prev => Math.max(0, prev - 1));
            };

            const addSub = () => {
                if (!subOut || !subIn) return;
                setSubs([...subs, { playerOut: subOut, playerIn: subIn }]);
                setSubOut(''); setSubIn('');
            };

            const addCaution = () => {
                if (!cautionPlayer) return;
                setCautions([...cautions, { playerId: cautionPlayer }]);
                setCautionPlayer('');
            };

            const addEjection = () => {
                if (!ejectionPlayer) return;
                setEjections([...ejections, { playerId: ejectionPlayer }]);
                setEjectionPlayer('');
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!opponent) return;

                const matchData = {
                    date, matchCategory, opponent, 
                    ownScore: parseInt(ownScore, 10), 
                    opponentScore: parseInt(opponentScore, 10), 
                    result, starters, subs, goals, cautions, ejections
                };

                const matchesCollectionPath = `artifacts/${appId}/public/data/matches`;

                if (existingMatch) {
                    await db.collection(matchesCollectionPath).doc(existingMatch.id).update(matchData);
                } else {
                    await db.collection(matchesCollectionPath).add(matchData);
                }
                navigate('match-list');
            };

            return (
                <form onSubmit={handleSubmit} className="max-w-3xl mx-auto bg-gray-800 p-6 rounded-lg border border-gray-700 space-y-6">
                    <h2 className="text-2xl font-bold border-b border-gray-700 pb-3">{existingMatch ? '試合記録の編集' : '新しい試合の記録'}</h2>
                    
                    <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
                        <div>
                            <label className="block text-xs font-medium text-gray-400">試合日</label>
                            <input type="date" value={date} onChange={(e) => setDate(e.target.value)} className="mt-1 block w-full bg-gray-700 border border-gray-600 rounded-md py-2 px-3 text-white text-sm" required />
                        </div>
                        <div>
                            <label className="block text-xs font-medium text-gray-400">カテゴリー</label>
                            <select value={matchCategory} onChange={(e) => setMatchCategory(e.target.value)} className="mt-1 block w-full bg-gray-700 border border-gray-600 rounded-md py-2 px-3 text-white text-sm">
                                {categories.map(c => <option key={c} value={c}>{c}</option>)}
                            </select>
                        </div>
                        <div>
                            <label className="block text-xs font-medium text-gray-400">対戦相手</label>
                            <input type="text" value={opponent} onChange={(e) => setOpponent(e.target.value)} className="mt-1 block w-full bg-gray-700 border border-gray-600 rounded-md py-2 px-3 text-white text-sm" placeholder="〇〇FC" required />
                        </div>
                    </div>

                    <div className="grid grid-cols-3 gap-4 bg-gray-900 p-4 rounded-lg items-center">
                        <div className="text-center">
                            <label className="block text-xs font-medium text-gray-400 mb-1">古堅南FC</label>
                            <input type="number" value={ownScore} onChange={(e) => setOwnScore(parseInt(e.target.value, 10) || 0)} className="w-16 bg-gray-700 border border-gray-600 rounded-md py-2 text-center text-xl font-bold text-white" min="0" />
                        </div>
                        <div className="text-center text-gray-500 font-bold text-xl">VS</div>
                        <div className="text-center">
                            <label className="block text-xs font-medium text-gray-400 mb-1">相手チーム</label>
                            <input type="number" value={opponentScore} onChange={(e) => setOpponentScore(parseInt(e.target.value, 10) || 0)} className="w-16 bg-gray-700 border border-gray-600 rounded-md py-2 text-center text-xl font-bold text-white" min="0" />
                        </div>
                    </div>

                    <div>
                        <label className="block text-sm font-medium text-gray-300 mb-2">スターティングメンバー (選択中: {starters.length}人)</label>
                        <div className="grid grid-cols-2 sm:grid-cols-4 gap-2 bg-gray-900 p-3 rounded-lg max-h-48 overflow-y-auto">
                            {[...players].sort((a,b)=>a.number-b.number).map(p => {
                                const isSelected = starters.some(s => s.playerId === p.id);
                                return (
                                    <button 
                                        type="button" 
                                        key={p.id} 
                                        onClick={() => toggleStarter(p.id)}
                                        className={`p-2 text-left text-xs rounded-md border flex justify-between items-center transition-colors ${isSelected ? 'bg-sky-600 border-sky-400 text-white font-bold' : 'bg-gray-800 border-gray-700 text-gray-300 hover:bg-gray-700'}`}
                                    >
                                        <span>#{p.number} {p.name}</span>
                                        <span className="text-[10px] text-gray-400">({p.category})</span>
                                    </button>
                                );
                            })}
                        </div>
                    </div>

                    <div className="bg-gray-900 p-4 rounded-lg space-y-3">
                        <label className="block text-sm font-medium text-gray-300">得点/アシストの記録</label>
                        <div className="flex flex-col sm:flex-row gap-2">
                            <select value={currentScorer} onChange={(e) => setCurrentScorer(e.target.value)} className="bg-gray-700 border border-gray-600 rounded-md p-2 text-xs flex-1 text-white">
                                <option value="">-- 得点者 --</option>
                                {[...players].sort((a,b)=>a.number-b.number).map(p => <option key={p.id} value={p.id}>#{p.number} {p.name}</option>)}
                            </select>
                            <select value={currentAssist} onChange={(e) => setCurrentAssist(e.target.value)} className="bg-gray-700 border border-gray-600 rounded-md p-2 text-xs flex-1 text-white">
                                <option value="">-- アシスト者 (任意) --</option>
                                {[...players].sort((a,b)=>a.number-b.number).map(p => <option key={p.id} value={p.id}>#{p.number} {p.name}</option>)}
                            </select>
                            <button type="button" onClick={addGoal} className="bg-green-600 hover:bg-green-500 text-white font-bold text-xs px-4 py-2 rounded-md">追加</button>
                        </div>
                        {goals.length > 0 && (
                            <ul className="space-y-1 text-xs text-gray-300 bg-gray-800 p-2 rounded border border-gray-700">
                                {goals.map((g, i) => (
                                    <li key={i} className="flex justify-between items-center bg-gray-850 p-1.5 rounded">
                                        <span>
                                            [{i+1}] 得点: {players.find(p=>p.id===g.scorerId)?.name || '不明'} 
                                            {g.assistId && ` / アシスト: ${players.find(p=>p.id===g.assistId)?.name || '不明'}`}
                                        </span>
                                        <button type="button" onClick={() => removeGoal(i)} className="text-red-400 hover:text-red-300">削除</button>
                                    </li>
                                ))}
                            </ul>
                        )}
                    </div>

                    <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
                        <div className="bg-gray-900 p-3 rounded-lg space-y-2">
                            <label className="block text-xs font-medium text-gray-300">交代</label>
                            <select value={subOut} onChange={(e) => setSubOut(e.target.value)} className="bg-gray-700 border border-gray-600 rounded-md p-1.5 text-xs w-full text-white">
                                <option value="">-- OUT --</option>
                                {players.map(p => <option key={p.id} value={p.id}>#{p.number} {p.name}</option>)}
                            </select>
                            <select value={subIn} onChange={(e) => setSubIn(e.target.value)} className="bg-gray-700 border border-gray-600 rounded-md p-1.5 text-xs w-full text-white">
                                <option value="">-- IN --</option>
                                {players.map(p => <option key={p.id} value={p.id}>#{p.number} {p.name}</option>)}
                            </select>
                            <button type="button" onClick={addSub} className="bg-gray-700 hover:bg-gray-600 text-white font-bold text-xs w-full py-1 rounded">交代追加</button>
                            <p className="text-[10px] text-gray-400">登録済み: {subs.length}件</p>
                        </div>

                        <div className="bg-gray-900 p-3 rounded-lg space-y-2">
                            <label className="block text-xs font-medium text-yellow-500">警告 (イエロー)</label>
                            <select value={cautionPlayer} onChange={(e) => setCautionPlayer(e.target.value)} className="bg-gray-700 border border-gray-600 rounded-md p-1.5 text-xs w-full text-white">
                                <option value="">-- 選手 --</option>
                                {players.map(p => <option key={p.id} value={p.id}>#{p.number} {p.name}</option>)}
                            </select>
                            <button type="button" onClick={addCaution} className="bg-yellow-600 hover:bg-yellow-500 text-white font-bold text-xs w-full py-1 rounded">警告追加</button>
                            <p className="text-[10px] text-gray-400">登録済み: {cautions.length}件</p>
                        </div>

                        <div className="bg-gray-900 p-3 rounded-lg space-y-2">
                            <label className="block text-xs font-medium text-red-500">退場 (レッド)</label>
                            <select value={ejectionPlayer} onChange={(e) => setEjectionPlayer(e.target.value)} className="bg-gray-700 border border-gray-600 rounded-md p-1.5 text-xs w-full text-white">
                                <option value="">-- 選手 --</option>
                                {players.map(p => <option key={p.id} value={p.id}>#{p.number} {p.name}</option>)}
                            </select>
                            <button type="button" onClick={addEjection} className="bg-red-600 hover:bg-red-500 text-white font-bold text-xs w-full py-1 rounded">退場追加</button>
                            <p className="text-[10px] text-gray-400">登録済み: {ejections.length}件</p>
                        </div>
                    </div>

                    <div className="flex gap-4 border-t border-gray-700 pt-4">
                        <button type="submit" className="flex-1 bg-red-500 hover:bg-red-600 text-white font-bold py-3 rounded-lg shadow-md">{existingMatch ? '変更を保存' : '試合結果を登録'}</button>
                        <button type="button" onClick={() => navigate('match-list')} className="bg-gray-700 hover:bg-gray-600 text-white font-bold py-3 px-6 rounded-lg">キャンセル</button>
                    </div>
                </form>
            );
        }

        function PlayerStatsList({ playerStats }) {
            const [sortKey, setSortKey] = useState('number');
            const [sortAsc, setSortAsc] = useState(true);

            const handleSort = (key) => {
                if (sortKey === key) {
                    setSortAsc(!sortAsc);
                } else {
                    setSortKey(key);
                    setSortAsc(false);
                }
            };

            const sortedStats = useMemo(() => {
                return [...playerStats].sort((a, b) => {
                    let valA = a[sortKey];
                    let valB = b[sortKey];
                    if (sortKey === 'number') {
                        return sortAsc ? valA - valB : valB - valA;
                    }
                    return sortAsc ? (valA > valB ? 1 : -1) : (valA < valB ? 1 : -1);
                });
            }, [playerStats, sortKey, sortAsc]);

            return (
                <div className="space-y-6">
                    <h2 className="text-3xl font-bold text-center">選手成績一覧</h2>
                    <p className="text-center text-xs text-gray-400">各項目をクリックすると並び替えができます。</p>
                    
                    <div className="bg-gray-800 p-4 rounded-lg border border-gray-700 max-w-5xl mx-auto overflow-x-auto">
                        <table className="w-full text-left border-collapse text-sm">
                            <thead>
                                <tr className="border-b border-gray-700 text-gray-400 cursor-pointer select-none">
                                    <th onClick={() => handleSort('number')} className="py-3 px-4 hover:text-white">背番号 {sortKey === 'number' && (sortAsc ? '▲' : '▼')}</th>
                                    <th onClick={() => handleSort('name')} className="py-3 px-4 hover:text-white">選手名</th>
                                    <th onClick={() => handleSort('category')} className="py-3 px-4 hover:text-white">カテゴリ</th>
                                    <th onClick={() => handleSort('totalMatchesPlayed')} className="py-3 px-4 text-center hover:text-white">出場試合数</th>
                                    <th onClick={() => handleSort('totalGoals')} className="py-3 px-4 text-center hover:text-white text-red-400">得点</th>
                                    <th onClick={() => handleSort('totalAssists')} className="py-3 px-4 text-center hover:text-white text-sky-400">アシスト</th>
                                    <th onClick={() => handleSort('totalCautions')} className="py-3 px-4 text-center hover:text-white text-yellow-500">警告</th>
                                    <th onClick={() => handleSort('totalEjections')} className="py-3 px-4 text-center hover:text-white text-red-500">退場</th>
                                </tr>
                            </thead>
                            <tbody>
                                {sortedStats.map(p => (
                                    <tr key={p.id} className="border-b border-gray-700 hover:bg-gray-750">
                                        <td className="py-3 px-4 font-mono">#{p.number}</td>
                                        <td className="py-3 px-4 font-bold">{p.name}</td>
                                        <td className="py-3 px-4 text-xs text-gray-400">{p.category}</td>
                                        <td className="py-3 px-4 text-center font-bold">{p.totalMatchesPlayed}</td>
                                        <td className="py-3 px-4 text-center text-red-400 font-bold">{p.totalGoals}</td>
                                        <td className="py-3 px-4 text-center text-sky-400 font-bold">{p.totalAssists}</td>
                                        <td className="py-3 px-4 text-center text-yellow-600">{p.totalCautions}</td>
                                        <td className="py-3 px-4 text-center text-red-600">{p.totalEjections}</td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        }

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
      };
    </script>
</body>
</html>
